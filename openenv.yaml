name: openaudit
version: "1.0.0"
description: "AI ecosystem trust & quality auditing environment"
author: "kiran-sindagi"
tags: [openenv, auditing, trust, safety, huggingface]
tasks:
  - id: model_card_easy
    difficulty: easy
    grader:
      type: llm
      prompt_template: "Score the audit finding for missing model card fields 0.0 to 1.0. Finding: {description}"
  - id: model_card_medium
    difficulty: medium
    grader:
      type: llm
      prompt_template: "Score the license conflict detection quality 0.0 to 1.0. Finding: {description}"
  - id: model_card_hard
    difficulty: hard
    grader:
      type: llm
      prompt_template: "Score the benchmark fraud detection quality 0.0 to 1.0. Finding: {description}"
  - id: dataset_qc_easy
    difficulty: easy
    grader:
      type: llm
      prompt_template: "Score the null value detection quality 0.0 to 1.0. Finding: {description}"
  - id: dataset_qc_medium
    difficulty: medium
    grader:
      type: llm
      prompt_template: "Score the duplicate detection quality 0.0 to 1.0. Finding: {description}"
  - id: dataset_qc_hard
    difficulty: hard
    grader:
      type: llm
      prompt_template: "Score the test leakage detection quality 0.0 to 1.0. Finding: {description}"
  - id: rl_reward_easy
    difficulty: easy
    grader:
      type: llm
      prompt_template: "Score the sparse reward detection quality 0.0 to 1.0. Finding: {description}"
  - id: rl_reward_medium
    difficulty: medium
    grader:
      type: llm
      prompt_template: "Score the reward hacking detection quality 0.0 to 1.0. Finding: {description}"
  - id: rl_reward_hard
    difficulty: hard
    grader:
      type: llm
      prompt_template: "Score the broken verifier detection quality 0.0 to 1.0. Finding: {description}"
  - id: tool_tester_easy
    difficulty: easy
    grader:
      type: llm
      prompt_template: "Score the code quality issue detection 0.0 to 1.0. Finding: {description}"
  - id: tool_tester_medium
    difficulty: medium
    grader:
      type: llm
      prompt_template: "Score the silent failure detection quality 0.0 to 1.0. Finding: {description}"
  - id: tool_tester_hard
    difficulty: hard
    grader:
      type: llm
      prompt_template: "Score the adversarial chain detection quality 0.0 to 1.0. Finding: {description}"
  - id: model_card_audit_chain
    difficulty: hard
    grader:
      type: llm
      prompt_template: "Score the multi-step audit chain quality 0.0 to 1.0. Finding: {description}"
observation_space:
  type: object
  fields: [artifact_type, content, metadata, step_number, findings_so_far, max_steps, task_id, instructions]
action_space:
  type: object
  fields: [pillar, finding_type, target_field, description, severity]
reward_space:
  type: float
  min: 0.0
  max: 1.0
endpoint: https://kiransin-openaudit.hf.space